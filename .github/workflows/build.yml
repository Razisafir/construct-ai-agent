name: Build Construct Desktop App

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # -- Lock file integrity check --------------------------------------------
  check-lock-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify requirements-lock.txt is in sync
        run: |
          cd agent-backend
          pip install -r requirements.txt
          pip freeze > requirements-fresh.txt
          diff requirements-lock.txt requirements-fresh.txt || (echo "Lock file out of sync. Run: pip freeze > requirements-lock.txt" && exit 1)

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Verify package-lock.json is in sync
        run: |
          npm ci --package-lock-only
          git diff --exit-code package-lock.json || (echo "package-lock.json out of sync. Run: npm install" && exit 1)

  # -- Frontend checks (non-blocking) ---------------------------------------
  check-frontend:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vite production build
        run: npx vite build

  # -- Windows MSI + EXE ----------------------------------------------------
  build-windows:
    runs-on: windows-latest
    needs: [check-lock-files]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - run: npm ci

      - name: Build frontend
        run: npx vite build

      - name: Build Tauri app (Windows)
        run: cd src/main && cargo tauri build

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: construct-windows-msi
          path: src/main/target/release/bundle/msi/*.msi
          retention-days: 7

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: construct-windows-exe
          path: src/main/target/release/construct.exe
          retention-days: 7

  # -- macOS DMG (Universal Intel + Apple Silicon) --------------------------
  build-macos:
    runs-on: macos-latest
    needs: [check-lock-files]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - run: npm ci

      - name: Build frontend
        run: npx vite build

      - name: Build Tauri app (macOS)
        run: cd src/main && cargo tauri build --target universal-apple-darwin

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: construct-macos-dmg
          path: src/main/target/release/bundle/dmg/*.dmg
          retention-days: 7

  # -- Linux (.deb + .AppImage) ---------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    needs: [check-lock-files]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev \
            libappindicator3-dev librsvg2-dev patchelf pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - run: npm ci

      - name: Build frontend
        run: npx vite build

      - name: Build Tauri app (Linux)
        run: cd src/main && cargo tauri build

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: construct-linux-deb
          path: src/main/target/release/bundle/deb/*.deb
          retention-days: 7

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: construct-linux-appimage
          path: src/main/target/release/bundle/appimage/*.AppImage
          retention-days: 7

  # -- Python backend tests (blocking) --------------------------------------
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('agent-backend/requirements.txt', 'agent-backend/requirements-test.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd agent-backend
          pip install -r requirements.txt -r requirements-test.txt

      - name: Lint with ruff
        run: |
          cd agent-backend
          ruff check . --select E,W,F,I,N

      - name: Format check with black
        run: |
          cd agent-backend
          black --check .

      - name: Run unit tests with coverage
        run: |
          cd agent-backend
          pytest tests/unit -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=80

      - name: Run integration tests
        run: |
          cd agent-backend
          pytest tests/integration -v --tb=short

      - name: Run E2E tests
        run: |
          cd agent-backend
          uvicorn app:app --host 127.0.0.1 --port 8000 &
          BACKEND_PID=$!
          sleep 3
          pytest tests/e2e -v --tb=short
          kill $BACKEND_PID 2>/dev/null

  # -- Rust tests + lint (blocking) -----------------------------------------
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/main/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/main/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cd src/main && cargo fmt -- --check

      - name: Run Clippy
        run: cd src/main && cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cd src/main && cargo test --lib

  # -- Frontend tests + lint (blocking) -------------------------------------
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint check
        run: npx eslint src/renderer --ext .ts,.tsx --max-warnings=0

      - name: Prettier check
        run: npx prettier --check "src/renderer/**/*.{ts,tsx,css}"

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run --coverage

  # -- End-to-end pipeline test ---------------------------------------------
  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-python, test-rust, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Python deps
        run: |
          cd agent-backend
          pip install -r requirements.txt -r requirements-test.txt

      - run: npm ci

      - name: Start backend and run E2E test
        run: |
          cd agent-backend
          uvicorn app:app --host 127.0.0.1 --port 8000 &
          BACKEND_PID=$!
          sleep 3
          cd ..
          pytest agent-backend/tests/e2e/test_full_pipeline.py -v
          kill $BACKEND_PID 2>/dev/null

  # -- Create GitHub Release on tag push ------------------------------------
  create-release:
    needs: [build-windows, build-macos, build-linux, test-python, test-rust, test-frontend, test-e2e]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
