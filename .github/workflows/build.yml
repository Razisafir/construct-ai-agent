name: MVP Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (vite)
        run: npm run build

      - name: Check frontend output
        run: |
          dir dist
          dir dist\index.html

      # Create a placeholder sidecar binary so tauri-build doesn't fail.
      # The real Python sidecar is built in the Release workflow.
      - name: Create placeholder sidecar binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src\main\bin
          $placeholder = "src\main\bin\agent-backend-x86_64-pc-windows-msvc.exe"
          # Minimal PE: a tiny .NET console app that exits immediately
          Add-Type -OutputAssembly $placeholder -OutputType ConsoleApplication -TypeDefinition 'class P{static void Main(){System.Environment.Exit(0)}}'
          Write-Host "Created placeholder sidecar: $placeholder ($(Get-Item $placeholder).Length bytes)"

      - name: Build Rust (cargo)
        run: cd src/main && cargo build --release --verbose

      - name: Bundle with Tauri CLI
        run: cd src/main && npx tauri build --verbose
        env:
          NODE_ENV: production

      - name: Check bundle output
        run: |
          dir src\main\target\release\bundle\

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: construct-windows-installer
          path: src/main/target/release/bundle/msi/*.msi

      - name: Upload .exe (nsis) artifact
        uses: actions/upload-artifact@v4
        with:
          name: construct-windows-exe
          path: src/main/target/release/bundle/nsis/*.exe

      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: |
            src/main/target/release/bundle/msi/*.msi
            src/main/target/release/bundle/nsis/*.exe
          body: |
            Construct MVP Build — Windows installer
            This is a minimal build to verify the pipeline works.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
