name: Build Construct Desktop App

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # ── Frontend checks (non-blocking) ────────────────────────────────────────
  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit || true

      - name: Vite production build
        run: npx vite build || true

  # ── Windows MSI + EXE ─────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          rust-version: stable
          components: rustfmt, clippy

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - run: npm ci

      - name: Build frontend
        run: npx vite build

      - name: Build Tauri app (Windows)
        run: cd src/main && cargo tauri build

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: construct-windows-msi
          path: src/main/target/release/bundle/msi/*.msi
          retention-days: 7

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: construct-windows-exe
          path: src/main/target/release/construct.exe
          retention-days: 7

  # ── macOS DMG (Universal Intel + Apple Silicon) ───────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          rust-version: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - run: npm ci

      - name: Build frontend
        run: npx vite build

      - name: Build Tauri app (macOS)
        run: cd src/main && cargo tauri build --target universal-apple-darwin

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: construct-macos-dmg
          path: src/main/target/release/bundle/dmg/*.dmg
          retention-days: 7

  # ── Linux (.deb + .AppImage) ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev \
            libappindicator3-dev librsvg2-dev patchelf pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          rust-version: stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - run: npm ci

      - name: Build frontend
        run: npx vite build

      - name: Build Tauri app (Linux)
        run: cd src/main && cargo tauri build

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: construct-linux-deb
          path: src/main/target/release/bundle/deb/*.deb
          retention-days: 7

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: construct-linux-appimage
          path: src/main/target/release/bundle/appimage/*.AppImage
          retention-days: 7

  # ── Python backend tests ───────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd agent-backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          cd agent-backend
          pytest tests/ -v --tb=short || true

  # ── Create GitHub Release on tag push ─────────────────────────────────────
  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
