name: MVP Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (vite)
        run: npm run build

      - name: Check frontend output
        run: |
          dir dist
          dir dist\index.html

      - name: Build Rust (cargo)
        run: cd src/main && cargo build --release --verbose

      - name: Bundle with Tauri CLI
        run: cd src/main && npx tauri build --verbose --no-bundle
        env:
          NODE_ENV: production

      - name: Bundle MSI installer
        run: cd src/main && npx tauri bundle --bundles msi
        env:
          NODE_ENV: production

      - name: Check bundle output
        run: |
          dir src\main\target\release\bundle\msi\

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: construct-windows-installer
          path: src/main/target/release/bundle/msi/*.msi

      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: src/main/target/release/bundle/msi/*.msi
          body: |
            Construct MVP Build — Windows .msi installer
            This is a minimal build to verify the pipeline works.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
