name: Build & Test

on:
  push:
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # =====================================================================
  # TEST JOBS — run on every PR and tag push (parallel, fail-fast: false)
  # =====================================================================

  # -- Python Unit Tests -------------------------------------------------
  test-python-unit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            agent-backend/requirements.txt
            agent-backend/requirements-test.txt

      - name: Install Python dependencies
        working-directory: agent-backend
        run: python -m pip install -r requirements.txt -r requirements-test.txt

      - name: Run Python unit tests
        working-directory: agent-backend
        run: python -m pytest tests/unit/ -v

  # -- Rust Tests --------------------------------------------------------
  test-rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/main/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/main/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - name: Create placeholder sidecar binary
        run: |
          mkdir -p src/main/bin
          touch src/main/bin/agent-backend-x86_64-unknown-linux-gnu

      - name: Cargo check
        working-directory: src/main
        run: cargo check

      - name: Run Rust tests
        working-directory: src/main
        run: cargo test

      - name: Run Clippy lints
        working-directory: src/main
        run: cargo clippy -- -D warnings

  # -- Frontend Tests ----------------------------------------------------
  test-frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run lint

      - name: Run Vitest tests
        run: npm run test -- --run

      - name: Build frontend (vite)
        run: npm run build

  # =====================================================================
  # BUILD JOBS — gated on all tests passing
  # =====================================================================

  # -- Windows -----------------------------------------------------------
  build-windows:
    needs: [test-python-unit, test-rust, test-frontend]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (vite)
        run: npm run build

      # Create a placeholder sidecar binary so tauri-build doesn't fail.
      # tauri-build only checks that the FILE EXISTS at compile time — it
      # does not execute it.  A zero-byte file is sufficient.
      - name: Create placeholder sidecar binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src\main\bin
          $placeholder = "src\main\bin\agent-backend-x86_64-pc-windows-msvc.exe"
          New-Item -ItemType File -Force -Path $placeholder
          Write-Host "Created placeholder sidecar: $placeholder"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './src/main'
          args: ''

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: construct-windows-msi
          path: src/main/target/release/bundle/msi/*.msi

      - name: Upload .exe (nsis) artifact
        uses: actions/upload-artifact@v4
        with:
          name: construct-windows-exe
          path: src/main/target/release/bundle/nsis/*.exe

  # -- macOS ---------------------------------------------------------------
  build-macos:
    needs: [test-python-unit, test-rust, test-frontend]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (vite)
        run: npm run build

      - name: Create placeholder sidecar binary (arm64)
        shell: bash
        run: |
          mkdir -p src/main/bin
          touch src/main/bin/agent-backend-aarch64-apple-darwin
          echo "Created placeholder sidecar for arm64"

      - name: Create placeholder sidecar binary (x86_64)
        shell: bash
        run: |
          touch src/main/bin/agent-backend-x86_64-apple-darwin
          echo "Created placeholder sidecar for x86_64"

      - name: Create universal placeholder sidecar
        shell: bash
        run: |
          # Copy arm64 binary as universal placeholder
          cp src/main/bin/agent-backend-aarch64-apple-darwin src/main/bin/agent-backend-universal-apple-darwin
          echo "Created universal placeholder sidecar"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './src/main'
          args: '--target universal-apple-darwin'

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: construct-macos-dmg
          path: src/main/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  # -- Linux ---------------------------------------------------------------
  build-linux:
    needs: [test-python-unit, test-rust, test-frontend]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (vite)
        run: npm run build

      - name: Create placeholder sidecar binary
        shell: bash
        run: |
          mkdir -p src/main/bin
          touch src/main/bin/agent-backend-x86_64-unknown-linux-gnu
          echo "Created placeholder sidecar for Linux"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './src/main'
          args: ''

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: construct-linux-deb
          path: src/main/target/release/bundle/deb/*.deb

      - name: Upload .AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: construct-linux-appimage
          path: src/main/target/release/bundle/appimage/*.AppImage

  # -- Draft Release -------------------------------------------------------
  draft-release:
    needs: [test-python-unit, test-rust, test-frontend, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: |
            artifacts/construct-windows-msi/*.msi
            artifacts/construct-windows-exe/*.exe
            artifacts/construct-macos-dmg/*.dmg
            artifacts/construct-linux-deb/*.deb
            artifacts/construct-linux-appimage/*.AppImage
          body: |
            Construct MVP Build — All platforms
            This is a minimal build to verify the pipeline works.
            The sidecar binary is a placeholder (not the real Python backend).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
