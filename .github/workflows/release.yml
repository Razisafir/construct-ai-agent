name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # -- Windows -------------------------------------------------------------
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python deps + PyInstaller
        shell: bash
        run: |
          cd agent-backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar
        shell: bash
        run: |
          cd agent-backend
          python pyinstaller_build.py
          echo "--- Sidecar binary ---"
          ls -la ../src/main/bin/

      - run: npm ci

      - name: Install Tauri CLI v2
        run: npm install @tauri-apps/cli@^2

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './src/main'
          args: ''

  # -- macOS -------------------------------------------------------------
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install Python deps + PyInstaller
        run: |
          cd agent-backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build sidecar (arm64 native)
        run: |
          cd agent-backend
          python pyinstaller_build.py
          echo "--- arm64 sidecar ---"
          ls -la ../src/main/bin/

      - name: Build sidecar (x86_64 via Rosetta)
        run: |
          cd agent-backend
          arch -x86_64 python pyinstaller_build.py || echo "Rosetta not available, using arm64 only"
          echo "--- sidecar bin dir ---"
          ls -la ../src/main/bin/

      - name: Create universal binary with lipo
        run: |
          mkdir -p src/main/bin
          ARM64="agent-backend-aarch64-apple-darwin"
          X86="agent-backend-x86_64-apple-darwin"
          UNI="agent-backend-universal-apple-darwin"
          if [ -f "src/main/bin/${X86}" ] && [ -f "src/main/bin/${ARM64}" ]; then
            lipo -create "src/main/bin/${X86}" "src/main/bin/${ARM64}" -output "src/main/bin/${UNI}"
            echo "Universal binary created"
            ls -la "src/main/bin/${UNI}"
          else
            echo "Universal binary not possible, using native arch only"
            # For universal-apple-darwin target, we need the universal binary.
            # If we can't create it, fall back to arm64 only.
            if [ -f "src/main/bin/${ARM64}" ]; then
              echo "Using arm64 binary as universal fallback"
            fi
          fi

      - run: npm ci

      - name: Install Tauri CLI v2
        run: npm install @tauri-apps/cli@^2

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './src/main'
          # Only build for arm64 if universal not available, otherwise universal
          args: '--target universal-apple-darwin'

  # -- Linux -------------------------------------------------------------
  release-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - name: Install Python deps + PyInstaller
        run: |
          cd agent-backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar
        run: |
          cd agent-backend
          python pyinstaller_build.py
          echo "--- Sidecar binary ---"
          ls -la ../src/main/bin/

      - run: npm ci

      - name: Install Tauri CLI v2
        run: npm install @tauri-apps/cli@^2

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './src/main'
          args: ''
