name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # -- Windows -------------------------------------------------------------
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python deps + PyInstaller
        shell: bash
        run: |
          cd agent-backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar
        shell: bash
        run: |
          cd agent-backend
          python pyinstaller_build.py
          echo "--- Sidecar binary ---"
          ls -la ../src/main/bin/

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI v2
        run: npm install @tauri-apps/cli@^2

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './src/main'
          tagName: ${{ github.ref_name }}
          releaseName: 'Construct ${{ github.ref_name }}'
          releaseBody: |
            Construct AI Agent desktop app release.
            See the assets below for downloadable installers.
          releaseDraft: true
          prerelease: true
          args: ''

  # -- macOS (Apple Silicon / arm64 only) --------------------------------
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Python deps + PyInstaller
        run: |
          cd agent-backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar
        run: |
          cd agent-backend
          python pyinstaller_build.py
          echo "--- Sidecar binary ---"
          ls -la ../src/main/bin/

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI v2
        run: npm install @tauri-apps/cli@^2

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './src/main'
          tagName: ${{ github.ref_name }}
          releaseName: 'Construct ${{ github.ref_name }}'
          releaseBody: |
            Construct AI Agent desktop app release.
            See the assets below for downloadable installers.
          releaseDraft: true
          prerelease: true
          args: '--target aarch64-apple-darwin'

  # -- Linux -------------------------------------------------------------
  release-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - name: Install Python deps + PyInstaller
        run: |
          cd agent-backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar
        run: |
          cd agent-backend
          python pyinstaller_build.py
          echo "--- Sidecar binary ---"
          ls -la ../src/main/bin/

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI v2
        run: npm install @tauri-apps/cli@^2

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './src/main'
          tagName: ${{ github.ref_name }}
          releaseName: 'Construct ${{ github.ref_name }}'
          releaseBody: |
            Construct AI Agent desktop app release.
            See the assets below for downloadable installers.
          releaseDraft: true
          prerelease: true
          args: ''
