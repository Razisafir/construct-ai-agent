name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # -- Windows -------------------------------------------------------------
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python deps + PyInstaller
        shell: bash
        run: |
          cd agent-backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar
        shell: bash
        run: |
          cd agent-backend
          python pyinstaller_build.py
          echo "--- Sidecar binary ---"
          ls -la ../src/main/bin/

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI v2
        run: npm install @tauri-apps/cli@^2

      - name: Build Tauri app
        shell: bash
        run: |
          cd src/main
          npx tauri build

      - name: List build artifacts
        shell: bash
        run: |
          echo "=== Bundle directory ==="
          find src/main/target/release/bundle -type f 2>/dev/null || echo "No bundle directory found"
          echo "=== Release directory ==="
          ls -la src/main/target/release/*.exe 2>/dev/null || echo "No exe found"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src/main/target/release/bundle/msi/*.msi
            src/main/target/release/bundle/nsis/*.exe

  # -- macOS (Apple Silicon / arm64 only) --------------------------------
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Python deps + PyInstaller
        run: |
          cd agent-backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar
        run: |
          cd agent-backend
          python pyinstaller_build.py
          echo "--- Sidecar binary ---"
          ls -la ../src/main/bin/

      - name: Ad-hoc sign sidecar for macOS bundling
        run: |
          codesign --force --sign - src/main/bin/agent-backend-aarch64-apple-darwin
          echo "Ad-hoc signed sidecar binary"

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI v2
        run: npm install @tauri-apps/cli@^2

      - name: Build Tauri app
        run: |
          cd src/main
          npx tauri build --target aarch64-apple-darwin

      - name: List build artifacts
        run: |
          echo "=== Bundle directory ==="
          find src/main/target/aarch64-apple-darwin/release/bundle -type f 2>/dev/null || echo "No bundle directory found"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: src/main/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  # -- Linux -------------------------------------------------------------
  release-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - name: Install Python deps + PyInstaller
        run: |
          cd agent-backend
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar
        run: |
          cd agent-backend
          python pyinstaller_build.py
          echo "--- Sidecar binary ---"
          ls -la ../src/main/bin/

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI v2
        run: npm install @tauri-apps/cli@^2

      - name: Build Tauri app
        run: |
          cd src/main
          npx tauri build

      - name: List build artifacts
        run: |
          echo "=== Bundle directory ==="
          find src/main/target/release/bundle -type f 2>/dev/null || echo "No bundle directory found"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            src/main/target/release/bundle/deb/*.deb
            src/main/target/release/bundle/appimage/*.AppImage

  # -- Create Draft Release ------------------------------------------------
  create-release:
    needs: [release-windows, release-macos, release-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f | head -30

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: |
            artifacts/windows-artifacts/*.msi
            artifacts/windows-artifacts/*.exe
            artifacts/macos-artifacts/*.dmg
            artifacts/linux-artifacts/*.deb
            artifacts/linux-artifacts/*.AppImage
          body: |
            Construct AI Agent desktop app release.
            See the assets below for downloadable installers.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
