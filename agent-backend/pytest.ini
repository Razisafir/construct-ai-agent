[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    asyncio: async test using pytest-asyncio
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (require running backend)
    llm: marks tests that require LLM API keys
